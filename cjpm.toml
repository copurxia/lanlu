[package]
  cjc-version = "1.1.0"
  name = "lanlu"
  description = "nothing here"
  version = "1.0.0"
  license = "BSD-3-Clause"
  output-type = "executable"
  compile-option = ""
  override-compile-option = ""
  # vips_ffi uses libvips for general-purpose decode/resize/crop/encode.
  link-option = "-larchive -lavif -lvips -lrocksdb -largon2 -lbrotlienc -lbrotlicommon -lgio-2.0 -lgobject-2.0 -lglib-2.0 -lgcc_s"

[dependencies]
  totp_crypto = { path = "packages/totp_crypto" }
  brotli_middleware = { path = "packages/brotli_middleware" }
  ace_web = { path = "ref/ACE/ace-web" }
  ace_router = { path = "ref/ACE/ace-router" }
  ace_http = { path = "ref/ACE/ace-http" }
  ace_observability = { path = "ref/ACE/ace-observability" }
  opengauss = {git = "https://gitcode.com/copur/opengauss-driver.git", branch = "master", output-type = "static"}
  cjdotenv = { git = "https://gitcode.com/copur/cjdotenv.git", branch = "master" }
  ahash = { git = "https://gitcode.com/copur/ahash.git", branch = "master" }
  cjpminfo = { git = "https://github.com/ystyle/cjpminfo.git", tag = "master" }
  cjcron = { path = "packages/cjcron" }
  epub = { path = "packages/epub" }
  archive_ffi = { path = "packages/archive_ffi" }
  rocksdb_ffi = { path = "packages/rocksdb_ffi" }
  argon2_ffi = { path = "packages/argon2_ffi" }
  avif_ffi = { path = "packages/avif_ffi" }
  vips_ffi = { path = "packages/vips_ffi" }
  wasmedge_ffi = { git = "https://gitcode.com/copur/wasmedge_ffi.git", branch = "main" }
  semver = { path = "packages/semver" }
  totp_cj = { git = "https://gitcode.com/copur/totp-cj.git", branch = "main" }
  webauthn_cj = { git = "https://gitcode.com/copur/webauthn.git", branch = "main" }

[package.package-configuration.lanlu]
  compile-option = "--static"

[target]
  [target.x86_64-unknown-linux-gnu]
    compile-option = "-O2 --cfg \"ohos=false\""
    [target.x86_64-unknown-linux-gnu.bin-dependencies]
      path-option = [ "${CANGJIE_STDX_PATH}" ]
