name: Build lanlu-cli
run-name: ${{ github.actor }} is building lanlu-cli (Rust musl) 

on:
  push:
    paths:
      - "cli/**"
  pull_request:
    paths:
      - "cli/**"

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Build lanlu-cli (static musl)
        run: |
          cd cli
          CC_x86_64_unknown_linux_musl=musl-gcc \
            cargo build --release --target x86_64-unknown-linux-musl

      - name: Package lanlu-cli skill zip
        run: |
          set -eux
          rm -rf dist
          mkdir -p dist/lanlu-cli
          cp cli/target/x86_64-unknown-linux-musl/release/lanlu-cli dist/lanlu-cli/
          cp cli/SKILL.md dist/lanlu-cli/
          chmod +x dist/lanlu-cli/lanlu-cli
          cd dist
          zip -qr "lanlu-cli-skill-${{ github.sha }}.zip" lanlu-cli
          ls -lah .

      - name: Upload lanlu-cli artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanlu-cli-skill
          path: dist/lanlu-cli-skill-*.zip
          retention-days: 30
name: Build lanlu-cli
run-name: ${{ github.actor }} is building lanlu-cli 🚀

on:
  push:
    paths:
      - "lanlu/cli/**"
  pull_request:
    paths:
      - "lanlu/cli/**"

jobs:
  build-cli:
    runs-on: ubuntu-latest
    env:
      XMAKE_ROOT: "y"
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Cangjie
        uses: Zxilly/setup-cangjie@v2
        with:
          channel: sts
          version: latest

      - name: Download stdx
        env:
          STDX_URL: ${{ vars.STDX_URL }}
        run: |
          set -eux
          : "${STDX_URL:?Missing repository variable STDX_URL}"
          wget -O s.zip "$STDX_URL"
          unzip -q s.zip -d stdx

      - name: Build lanlu-cli
        env:
          CANGJIE_STDX_PATH: ${{ github.workspace }}/stdx/linux_x86_64_cjnative/static/stdx
        run: |
          set -eux
          cd lanlu/cli
          cjpm build -V

      - name: Package lanlu-cli skill zip
        run: |
          set -eux
          rm -rf dist
          mkdir -p dist/lanlu-cli/scripts
          cp lanlu/cli/target/release/bin/cli dist/lanlu-cli/scripts/lanlu-cli
          cp lanlu/cli/SKILL.md dist/lanlu-cli/
          cd dist
          zip -qr "lanlu-cli-skill-${{ github.sha }}.zip" lanlu-cli
          ls -lah .

      - name: Upload lanlu-cli artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lanlu-cli-skill
          path: dist/lanlu-cli-skill-*.zip
          retention-days: 30
