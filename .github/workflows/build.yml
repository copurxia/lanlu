name: Build
run-name: ${{ github.actor }} is trying to auto compile with Actions 🚀

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # xmake refuses to run as root unless explicitly allowed. Some CI runners execute as root.
      XMAKE_ROOT: "y"
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Cangjie
        uses: Zxilly/setup-cangjie@v2
        with:
          channel: nightly
          version: ${{ vars.NIGHTLY_VERSION }}

      - name: Install build tools
        run: |
          set -eux

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              ca-certificates curl git wget unzip zip xz-utils \
              build-essential clang ninja-build cmake binutils \
              pkg-config \
              libarchive-dev libavif-dev \
              libvips-dev libheif-dev
          else
            apt-get update
            apt-get install -y --no-install-recommends \
              ca-certificates curl git wget unzip zip xz-utils \
              build-essential clang ninja-build cmake binutils \
              pkg-config \
              libarchive-dev libavif-dev \
              libvips-dev libheif-dev
          fi

      - name: Install xmake (official installer)
        run: |
          set -eux
          curl -fsSL https://xmake.io/shget.text | bash
          if command -v sudo >/dev/null 2>&1; then
            sudo ln -sf "$HOME/.local/bin/xmake" /usr/local/bin/xmake
          else
            ln -sf "$HOME/.local/bin/xmake" /usr/local/bin/xmake
          fi
          xmake --version

      - name: Download stdx
        env:
          STDX_URL: ${{ vars.STDX_URL }}
        run: |
          set -eux
          : "${STDX_URL:?Missing repository variable STDX_URL}"
          wget -O s.zip "$STDX_URL"
          unzip -q s.zip -d stdx

      - name: Build backend
        env:
          CANGJIE_STDX_PATH: ${{ github.workspace }}/stdx/linux_x86_64_cjnative/static/stdx
        run: |
          cjc -v
          cjpm build -V

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"

      - name: Setup pnpm (corepack)
        run: |
          set -eux
          corepack enable
          corepack prepare pnpm@10.27.0 --activate
          pnpm -v

      - name: Build frontend
        run: |
          cd frontend
          pnpm install
          pnpm run build

      - name: Prepare release artifacts
        run: |
          mkdir -p app
          mkdir -p app/frontend
          cp target/release/bin/main app/
          cp -r plugins app/plugins
          cp -r frontend/out app/frontend/out

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            app/main
            app/lib*
            app/frontend
            app/plugins

  package:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release
          path: ./app/

      - name: Set execute permissions
        run: chmod +x ./app/main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest
