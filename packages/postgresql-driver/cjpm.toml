[package]
  cjc-version = "1.1.0"
  name = "postgresql_driver"
  description = "Pure-Cangjie PostgreSQL driver via libpq FFI — implements csorm backend interfaces"
  version = "0.1.0"
  src-dir = "src"
  output-type = "static"
  compile-option = "-Woff unused -Woff deprecated"

[dependencies]
  csorm = { path = "../csorm" }

[test-dependencies]
  csorm_macros = { path = "../csorm/macros" }

[target.x86_64-unknown-linux-gnu]
  link-option = "-lpq"

[target.aarch64-apple-darwin]
  link-option = "-lpq -L/opt/homebrew/lib"