[package]
  cjc-version = "1.1.0"
  name = "lanlu_cli"
  description = "Lanlu command line client"
  version = "1.0.0"
  license = "BSD-3-Clause"
  output-type = "executable"
  compile-option = ""
  override-compile-option = ""

[dependencies]
  # stdx 由工具链提供，当前使用 build.sh 直接调用 cjc 编译。
  # cjpm 暂无法解析预编译 stdx，因此不通过 cjpm build 构建。

[package.package-configuration.lanlu_cli]
  compile-option = "--static"

[target]
  [target.x86_64-unknown-linux-gnu]
    compile-option = "-O2 --disable-reflection --cfg \"ohos=false\""
    [target.x86_64-unknown-linux-gnu.bin-dependencies]
      path-option = [ "${CANGJIE_STDX_PATH}" ]
