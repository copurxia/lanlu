[package]
  cjc-version = "1.1.0"
  name = "csorm"
  description = "Cangjie SeaORM — PG-focused ORM on postgresql-driver"
  version = "0.1.0"
  src-dir = "src"
  output-type = "static"
  compile-option = "-Woff unused"

[dependencies]
  postgresql_driver = { path = "../postgresql-driver" }
  csorm_macros = { path = "macros" }

[target.x86_64-unknown-linux-gnu]
  link-option = "-lpq"

[target.aarch64-apple-darwin]
  link-option = "-lpq -L/opt/homebrew/lib"
