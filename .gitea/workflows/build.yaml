name: Build
run-name: ${{ github.actor }} is trying to auto compile with Actions 🚀
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # xmake refuses to run as root unless explicitly allowed. Some CI runners execute as root.
      XMAKE_ROOT: 'y'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      # - name: Setup Cangjie
      #   uses: Zxilly/setup-cangjie@v2
      #   with:
      #   channel: lts
      #   version: auto
      - name: Install build tools
        run: |
          set -eux

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              ca-certificates curl git wget unzip zip xz-utils \
              build-essential clang ninja-build cmake binutils \
              xmake \
              pkg-config \
              libarchive-dev libavif-dev libbrotli-dev \
              libvips-dev libheif-dev librocksdb-dev
          else
            apt-get update
            apt-get install -y --no-install-recommends \
              ca-certificates curl git wget unzip zip xz-utils \
              build-essential clang ninja-build cmake binutils \
              xmake \
              pkg-config \
              libarchive-dev libavif-dev brotli \
              libvips-dev libheif-dev librocksdb-dev
          fi

      - name: Verify xmake
        run: |
          set -eux
          xmake --version
      - name: Unzip Cangjie
        run: |
          wget -O c.tar.gz "${{ vars.CANGJIE_URL }}"
          tar -xzvf c.tar.gz
          wget -O s.zip "${{ vars.STDX_URL }}"
          unzip s.zip -d stdx
      - name: Checkout WasmEdge source (public)
        uses: actions/checkout@v4
        with:
          repository: WasmEdge/WasmEdge
          path: build-script-cache/WasmEdge
          fetch-depth: 0
      - name: Set Up Cangjie and build
        run: |
          export CANGJIE_STDX_PATH="$PWD/stdx/linux_x86_64_cjnative/static/stdx"
          export WASMEDGE_REPO_DIR="$PWD/build-script-cache/WasmEdge"
          unset GIT_DIR GIT_WORK_TREE
          # ln -s "$PWD/stdx/linux_x86_64_cjnative" "$PWD/stdx/linux_x86_64_llvm"
          source cangjie/envsetup.sh
          cjpm update
          for f in $(find "$HOME/.cjpm/git/wasmedge_ffi" -type f -name build_native.sh 2>/dev/null); do
            grep -q "^unset GIT_DIR GIT_WORK_TREE$" "$f" || sed -i "2iunset GIT_DIR GIT_WORK_TREE" "$f"
          done
          cjc -v
          cjpm build -V
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.0'
      - name: Setup pnpm (corepack)
        run: |
          set -eux
          corepack enable
          corepack prepare pnpm@10.27.0 --activate
          pnpm -v
      - name: Build frontend
        run: |
          cd frontend
          pnpm install
          pnpm run build
      - name: Prepare release artifacts
        run: |
          mkdir -p app
          mkdir -p app/frontend
          cp target/release/bin/main app/
          cp -r frontend/out app/frontend/out
      - name: Archive production artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release
          path: |
            app/main
            app/lib*
            app/frontend
  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: release
          path: ./app/
      - name: Set execute permissions
        run: chmod +x ./app/main
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Resolve image metadata
        id: image_meta
        env:
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -eu
          registry="${SERVER_URL#https://}"
          registry="${registry#http://}"
          owner="${REPOSITORY%%/*}"
          repo="${REPOSITORY##*/}"

          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "image=$registry/$owner/$repo:latest" >> "$GITHUB_OUTPUT"
      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.image_meta.outputs.registry }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_meta.outputs.image }}
