name: Build lanlu-mcp
run-name: ${{ github.actor }} is building lanlu-mcp (Rust musl)
on:
  push:
    paths:
      - "mcp/**"
  pull_request:
    paths:
      - "mcp/**"
jobs:
  build-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install musl toolchain
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Build lanlu-mcp (static musl)
        run: |
          cd mcp
          CC_x86_64_unknown_linux_musl=musl-gcc \
            cargo build --release --target x86_64-unknown-linux-musl

      - name: Package lanlu-mcp zip
        run: |
          set -eux
          rm -rf dist
          mkdir -p dist/lanlu-mcp
          cp mcp/target/x86_64-unknown-linux-musl/release/lanlu-mcp dist/lanlu-mcp/
          cp mcp/README.md dist/lanlu-mcp/
          chmod +x dist/lanlu-mcp/lanlu-mcp
          cd dist
          zip -qr "lanlu-mcp-${{ github.sha }}.zip" lanlu-mcp
          ls -lah .

      - name: Upload lanlu-mcp artifacts
        uses: actions/upload-artifact@v3
        with:
          name: lanlu-mcp
          path: dist/lanlu-mcp-*.zip
          retention-days: 30
