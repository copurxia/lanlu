[package]
cjc-version = "1.1.0"
name = "lanlu_client_next"
version = "0.1.0"
description = "lanlu desktop client built on CangjieGUI"
output-type = "executable"
# vips_ffi 需要 libvips；Linux 下如遇 PCRE2_10.47 链接错误，需要 pcre2 那一行。
link-option = "-lvips -lgio-2.0 -lgobject-2.0 -lglib-2.0 -lvlc"

[dependencies]
cui = { path = "../packages/cangjie-gui" }
vips_ffi = { path = "../packages/vips_ffi" }
libvlc_ffi = { path = "../packages/libvlc_ffi" }
ignite = { git = "https://gitcode.com/copur/ignite-cangjie.git", branch = "stdx" }

[target.x86_64-unknown-linux-gnu]
# 仅当出现 undefined reference to ...@PCRE2_10.47 时取消注释：
# link-option = "/usr/lib/x86_64-linux-gnu/libpcre2-8.so"
  [target.x86_64-unknown-linux-gnu.bin-dependencies]
    # stdx（encoding.json.stream 等）以二进制依赖方式引入，与服务端 cjpm.toml 同款。
    path-option = [ "${CANGJIE_STDX_PATH}" ]
