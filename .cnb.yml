$:
  # Backend + frontend build, then (optionally) build & push Docker image.
  push:
    - &build_pipeline
      name: build
      # Import shared environment variables (e.g. CANGJIE_URL, STDX_URL).
      # CNB will fetch it with built-in credentials (CNB_TOKEN) during pipeline execution.
      imports:
        - https://cnb.cool/copurx/cangjie/-/blob/main/envs.yml
      runner:
        tags: cnb:arch:amd64
      docker:
        # Build a custom Ubuntu-based environment image first, then use it for all script jobs in this pipeline.
        build:
          dockerfile: .ide/Dockerfile
          by:
            - .ide/Dockerfile
          versionBy:
            - .ide/Dockerfile
        volumes:
          # pnpm store cache
          - main:/root/.local/share/pnpm:copy-on-write
          # cjpm / general caches
          - main:/root/.cache:copy-on-write
          - main:/root/.cjpm:copy-on-write
          # cache large downloaded SDK archives across builds
          - main:./build-script-cache:copy-on-write
      services:
        # Enable docker daemon (dind) + inject docker cli tools for docker build/push.
        - docker
      env:
        TZ: Asia/Shanghai
        # Avoid Next.js analytics/telemetry in CI.
        NEXT_TELEMETRY_DISABLED: "1"
      stages:
        - name: Show build environment versions
          script: |
            bash -lc '
              set -eux
              cat /etc/os-release || true
              bash --version | head -n 1
              node -v
              pnpm -v
              xmake --version
              clang --version | head -n 1
            '

        - name: Download Cangjie SDK + stdx
          script: |
            bash -lc '
              set -eux
              : "${CANGJIE_URL:?Missing env CANGJIE_URL (configure in CNB project variables)}"
              : "${STDX_URL:?Missing env STDX_URL (configure in CNB project variables)}"

              mkdir -p build-script-cache

              # Cangjie SDK
              if [ ! -d "./cangjie" ]; then
                wget -O build-script-cache/cangjie.tar.gz "$CANGJIE_URL"
                tar -xzf build-script-cache/cangjie.tar.gz
              fi

              # stdx
              if [ ! -d "./stdx" ]; then
                wget -O build-script-cache/stdx.zip "$STDX_URL"
                unzip -q build-script-cache/stdx.zip -d stdx
              fi
            '

        - name: Clone WasmEdge source (public)
          image: tencentcom/git-clone
          settings:
            git_url: https://github.com/WasmEdge/WasmEdge.git
            depth: 1
            dist: build-script-cache

        - name: Build backend (cjpm)
          script: |
            bash -lc '
              set -eux
              export XMAKE_ROOT=y
              export CANGJIE_STDX_PATH="$PWD/stdx/linux_x86_64_cjnative/static/stdx"
              export WASMEDGE_REPO_DIR="$PWD/build-script-cache/WasmEdge"
              # Some runners may leak git env into child processes.
              unset GIT_DIR GIT_WORK_TREE
              # cjpm may execute git-dependency build scripts with GIT_* set.
              # Patch wasmedge_ffi native build script to clear git env before nested git/cmake steps.
              WASMEDGE_COMMIT="$(awk '"'"'/wasmedge_ffi = \{git/{ if (match($0, /commitId = "([0-9a-f]+)"/, m)) { print m[1]; exit } }'"'"' cjpm.lock || true)"
              if [ -n "${WASMEDGE_COMMIT:-}" ]; then
                WASMEDGE_DEP_DIR="$HOME/.cjpm/git/wasmedge_ffi/$WASMEDGE_COMMIT"
                if [ ! -d "$WASMEDGE_DEP_DIR" ]; then
                  cjpm update
                fi
                if [ -f "$WASMEDGE_DEP_DIR/build_native.sh" ]; then
                  if ! grep -q "^unset GIT_DIR GIT_WORK_TREE$" "$WASMEDGE_DEP_DIR/build_native.sh"; then
                    sed -i "2iunset GIT_DIR GIT_WORK_TREE" "$WASMEDGE_DEP_DIR/build_native.sh"
                  fi
                fi
              fi
              # ln -s "$PWD/stdx/linux_x86_64_cjnative" "$PWD/stdx/linux_x86_64_llvm"

              # envsetup.sh references LD_LIBRARY_PATH and may fail under `set -u` if it is unset.
              export LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}"
              set +u
              source ./cangjie/envsetup.sh
              set -u

              cjc -v
              cjpm build -V
            '

        - name: Build frontend (pnpm)
          script: |
            bash -lc '
              set -eux
              cd frontend
              pnpm install --frozen-lockfile
              pnpm run build
            '

        - name: Prepare runtime bundle (./app)
          script: |
            bash -lc '
              set -eux
              rm -rf app
              mkdir -p app/frontend

              cp target/release/bin/main app/
              # Copy plugins dir to app/plugins (avoid app/plugins/plugins/* nesting).
              cp -r plugins app/
              cp -r frontend/out app/frontend/out
            '

        - name: Package runtime bundle (zip)
          script: |
            bash -lc '
              set -eux
              mkdir -p dist
              rm -f "dist/app-${CNB_COMMIT_SHORT:-latest}.zip"
              (cd app && zip -qr "../dist/app-${CNB_COMMIT_SHORT:-latest}.zip" .)
              ls -lah dist
            '

        - name: Upload build artifacts (attachments)
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/app-*.zip

        - name: Set CNB Docker image tag
          # Avoid pushing images from non-main branches / PR builds.
          if: test "$CNB_BRANCH" = "main"
          script: |
            bash -lc '
              set -eu
              # CNB provides built-in credentials; with `services: [docker]` we can push directly.
              printf "%s" "${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"
            '
          exports:
            stdout: IMAGE_TAG

        - name: Docker build
          if: test "$CNB_BRANCH" = "main"
          script: |
            bash -lc '
              set -eux
              docker build -t "$IMAGE_TAG" .
            '

        - name: Docker push (CNB Docker registry)
          if: test "$CNB_BRANCH" = "main"
          script: |
            bash -lc '
              set -eux
              docker push "$IMAGE_TAG"
            '

    - &extension_pipeline
      name: extension
      ifModify:
        - extension/**
      docker:
        build:
          dockerfile: .ide/Dockerfile
          by:
            - .ide/Dockerfile
          versionBy:
            - .ide/Dockerfile
        volumes:
          - main:/root/.local/share/pnpm:copy-on-write
      env:
        NEXT_TELEMETRY_DISABLED: "1"
      stages:
        - name: Build extension
          script: |
            bash -lc '
              set -eux
              cd extension
              pnpm install --frozen-lockfile
              pnpm run typecheck
              pnpm run build
            '

        - name: Package extension artifacts (zip)
          script: |
            bash -lc '
              set -eux
              command -v zip >/dev/null 2>&1 || (apt-get update && apt-get install -y --no-install-recommends zip && rm -rf /var/lib/apt/lists/*)
              mkdir -p dist
              rm -f "dist/extension-${CNB_COMMIT_SHORT:-latest}.zip"
              (cd extension/build/chrome-mv3-prod && zip -qr "../../../dist/extension-${CNB_COMMIT_SHORT:-latest}.zip" .)
              ls -lah dist
            '

        - name: Upload extension artifacts (attachments)
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/extension-*.zip

  pull_request:
    - *build_pipeline
    - *extension_pipeline
