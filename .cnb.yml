$:
  # Backend + frontend build, then (optionally) build & push Docker image.
  push:
    - &build_pipeline
      name: build
      # Import shared environment variables (e.g. CANGJIE_URL, STDX_URL).
      # CNB will fetch it with built-in credentials (CNB_TOKEN) during pipeline execution.
      imports:
        - https://cnb.cool/copurx/cangjie/-/blob/main/envs.yml
      runner:
        tags: cnb:arch:amd64
      docker:
        # Build a custom Ubuntu-based environment image first, then use it for all script jobs in this pipeline.
        build:
          dockerfile: .ide/Dockerfile
          by:
            - .ide/Dockerfile
          versionBy:
            - .ide/Dockerfile
        volumes:
          # pnpm store cache
          - main:/root/.local/share/pnpm:copy-on-write
          # cjpm / general caches
          - main:/root/.cache:copy-on-write
          - main:/root/.cjpm:copy-on-write
          # cache large downloaded SDK archives across builds
          - main:./build-script-cache:copy-on-write
      services:
        # Enable docker daemon (dind) + inject docker cli tools for docker build/push.
        - docker
      env:
        TZ: Asia/Shanghai
        # Avoid Next.js analytics/telemetry in CI.
        NEXT_TELEMETRY_DISABLED: "1"
      stages:
        - name: Show build environment versions
          script: |
            bash -lc '
              set -eux
              cat /etc/os-release || true
              bash --version | head -n 1
              node -v
              pnpm -v
              xmake --version
              clang --version | head -n 1
            '

        - name: Init submodules
          script: |
            bash -lc '
              set -eux
              unset GIT_DIR GIT_WORK_TREE
              git submodule update --init --recursive
            '

        - name: Download Cangjie SDK + stdx
          script: |
            bash -lc '
              set -eux
              : "${CANGJIE_URL:?Missing env CANGJIE_URL (configure in CNB project variables)}"
              : "${STDX_URL:?Missing env STDX_URL (configure in CNB project variables)}"

              mkdir -p build-script-cache

              # Cangjie SDK
              if [ ! -d "./cangjie" ]; then
                wget -O build-script-cache/cangjie.tar.gz "$CANGJIE_URL"
                tar -xzf build-script-cache/cangjie.tar.gz
              fi

              # stdx
              if [ ! -d "./stdx" ]; then
                wget -O build-script-cache/stdx.zip "$STDX_URL"
                unzip -q build-script-cache/stdx.zip -d stdx
              fi
            '

        - name: Sync WasmEdge source (public)
          script: |
            bash -lc '
              set -eux
              mkdir -p build-script-cache
              if [ -d "build-script-cache/WasmEdge/.git" ]; then
                git -C build-script-cache/WasmEdge fetch --all --prune
                git -C build-script-cache/WasmEdge reset --hard origin/HEAD
              else
                git clone https://github.com/WasmEdge/WasmEdge.git build-script-cache/WasmEdge
              fi
            '

        - name: Build backend (cjpm)
          script: |
            bash -lc '
              set -eux
              export XMAKE_ROOT=y
              export CANGJIE_STDX_PATH="$PWD/stdx/linux_x86_64_cjnative/static/stdx"
              export WASMEDGE_REPO_DIR="$PWD/build-script-cache/WasmEdge"
              # Some runners may leak git env into child processes.
              unset GIT_DIR GIT_WORK_TREE
              # ln -s "$PWD/stdx/linux_x86_64_cjnative" "$PWD/stdx/linux_x86_64_llvm"

              # envsetup.sh references LD_LIBRARY_PATH and may fail under `set -u` if it is unset.
              export LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}"
              set +u
              source ./cangjie/envsetup.sh
              set -u

              cjpm update
              # cjpm may execute git-dependency build scripts with GIT_* set.
              # Patch wasmedge_ffi native build script to clear git env before nested git/cmake steps.
              for f in $(find "$HOME/.cjpm/git/wasmedge_ffi" -type f -name build_native.sh 2>/dev/null); do
                grep -q "^unset GIT_DIR GIT_WORK_TREE$" "$f" || sed -i "2iunset GIT_DIR GIT_WORK_TREE" "$f"
              done

              cjc -v

              # Invalidate compiled build-script cache when Cangjie compiler version changes.
              # The cached binary (build-script-cache/release/wasmedge_ffi/bin/build-script)
              # is compiled by cjpm and is incompatible across compiler versions.
              CJ_VERSION=$(cjc -v 2>&1 | head -n1)
              CJ_VERSION_FILE="build-script-cache/release/.cj-version"
              mkdir -p build-script-cache/release
              if [ -f "$CJ_VERSION_FILE" ]; then
                if [ "$(cat "$CJ_VERSION_FILE")" != "$CJ_VERSION" ]; then
                  echo "Cangjie version changed ($(cat "$CJ_VERSION_FILE") -> $CJ_VERSION), clearing build-script cache..."
                  find build-script-cache/release -mindepth 1 -not -name '.cj-version' -delete
                fi
              else
                # Version file missing but cache exists, indicating stale cache from previous builds
                if [ -d "build-script-cache/release/wasmedge_ffi" ]; then
                  echo "Version file missing but cache exists, clearing build-script cache..."
                  find build-script-cache/release -mindepth 1 -delete
                fi
              fi
              echo "$CJ_VERSION" > "$CJ_VERSION_FILE"

              cjpm build -V
            '

        - name: Build frontend (pnpm)
          script: |
            bash -lc '
              set -eux
              cd frontend
              pnpm install --frozen-lockfile
              pnpm run build
            '

        - name: Prepare runtime bundle (./app)
          script: |
            bash -lc '
              set -eux
              rm -rf app
              mkdir -p app/frontend

              cp target/release/bin/main app/
              cp -r frontend/out app/frontend/out
            '

        - name: Package runtime bundle (zip)
          script: |
            bash -lc '
              set -eux
              mkdir -p dist
              rm -f "dist/app-${CNB_COMMIT_SHORT:-latest}.zip"
              (cd app && zip -qr "../dist/app-${CNB_COMMIT_SHORT:-latest}.zip" .)
              ls -lah dist
            '

        - name: Upload build artifacts (attachments)
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/app-*.zip

        - name: Set CNB Docker image tag
          # main -> :latest, other branches -> :dev-<sanitized-branch>
          script: |
            bash -lc '
              set -eu
              if [ "$CNB_BRANCH" = "main" ]; then
                tag="latest"
              else
                tag="dev-$(printf "%s" "$CNB_BRANCH" | tr "[:upper:]" "[:lower:]" | sed "s/[^a-z0-9.-]/-/g")"
              fi
              # CNB provides built-in credentials; with `services: [docker]` we can push directly.
              printf "%s" "${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${tag}"
            '
          exports:
            stdout: IMAGE_TAG

        - name: Docker build
          script: |
            bash -lc '
              set -eux
              docker build -t "$IMAGE_TAG" .
            '

        - name: Docker push (CNB Docker registry)
          script: |
            bash -lc '
              set -eux
              docker push "$IMAGE_TAG"
            '

    - &extension_pipeline
      name: extension
      ifModify:
        - extension/**
      docker:
        build:
          dockerfile: .ide/Dockerfile
          by:
            - .ide/Dockerfile
          versionBy:
            - .ide/Dockerfile
        volumes:
          - main:/root/.local/share/pnpm:copy-on-write
      env:
        NEXT_TELEMETRY_DISABLED: "1"
      stages:
        - name: Build extension
          script: |
            bash -lc '
              set -eux
              cd extension
              pnpm install --frozen-lockfile
              pnpm run typecheck
              pnpm run build
            '

        - name: Package extension artifacts (zip)
          script: |
            bash -lc '
              set -eux
              command -v zip >/dev/null 2>&1 || (apt-get update && apt-get install -y --no-install-recommends zip && rm -rf /var/lib/apt/lists/*)
              mkdir -p dist
              rm -f "dist/extension-${CNB_COMMIT_SHORT:-latest}.zip"
              (cd extension/build/chrome-mv3-prod && zip -qr "../../../dist/extension-${CNB_COMMIT_SHORT:-latest}.zip" .)
              ls -lah dist
            '

        - name: Upload extension artifacts (attachments)
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/extension-*.zip

    - &client_pipeline
      name: client
      ifModify:
        - client/**
      docker:
        image: reactnativecommunity/react-native-android
        volumes:
          - main:/root/.npm:copy-on-write
          - main:/root/.gradle:copy-on-write
      env:
        NEXT_TELEMETRY_DISABLED: "1"
      stages:
        - name: Build release APK
          script: |
            bash -lc '
              set -eux

              # Generate debug keystore if missing
              if [ ! -f client/android/app/debug.keystore ]; then
                keytool -genkey -v -keystore client/android/app/debug.keystore \
                  -storepass android -alias androiddebugkey -keypass android \
                  -keyalg RSA -keysize 2048 -validity 10000 \
                  -dname "CN=Android Debug,O=Android,C=US"
              fi

              cd client
              npm ci
              cd android
              ./gradlew assembleRelease
              ls -lh app/build/outputs/apk/release/
            '

        - name: Upload APK artifacts
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - client/android/app/build/outputs/apk/release/app-release.apk

    - &cli_pipeline
      name: cli
      ifModify:
        - packages/lanlu-cli/**
        - .agents/skills/lanlu-cli/**
      runner:
        tags: cnb:arch:amd64
      docker:
        build:
          dockerfile: .ide/Dockerfile
          by:
            - .ide/Dockerfile
          versionBy:
            - .ide/Dockerfile
        volumes:
          - main:/root/.cache:copy-on-write
          - main:/root/.cjpm:copy-on-write
          - main:./build-script-cache:copy-on-write
      env:
        TZ: Asia/Shanghai
      stages:
        - name: Show build environment versions
          script: |
            bash -lc '
              set -eux
              cat /etc/os-release || true
              bash --version | head -n 1
              node -v || true
              pnpm -v || true
              clang --version | head -n 1
            '

        - name: Download Cangjie SDK + stdx
          script: |
            bash -lc '
              set -eux
              : "${CANGJIE_URL:?Missing env CANGJIE_URL (configure in CNB project variables)}"
              : "${STDX_URL:?Missing env STDX_URL (configure in CNB project variables)}"

              mkdir -p build-script-cache

              if [ ! -d "./cangjie" ]; then
                wget -O build-script-cache/cangjie.tar.gz "$CANGJIE_URL"
                tar -xzf build-script-cache/cangjie.tar.gz
              fi

              if [ ! -d "./stdx" ]; then
                wget -O build-script-cache/stdx.zip "$STDX_URL"
                unzip -q build-script-cache/stdx.zip -d stdx
              fi
            '

        - name: Build lanlu-cli
          script: |
            bash -lc '
              set -eux
              export CANGJIE_STDX_PATH="$PWD/stdx/linux_x86_64_cjnative/static/stdx"
              unset GIT_DIR GIT_WORK_TREE
              export LD_LIBRARY_PATH="${LD_LIBRARY_PATH:-}"
              set +u
              source ./cangjie/envsetup.sh
              set -u
              cd packages/lanlu-cli
              ./build.sh
            '

        - name: Package lanlu-cli skill zip
          script: |
            bash -lc '
              set -eux
              rm -rf dist
              mkdir -p dist/lanlu-cli/scripts
              cp packages/lanlu-cli/lanlu-cli dist/lanlu-cli/scripts/
              cp .agents/skills/lanlu-cli/SKILL.md dist/lanlu-cli/
              cd dist
              zip -qr "lanlu-cli-skill-${CNB_COMMIT_SHORT:-latest}.zip" lanlu-cli
              ls -lah .
            '

        - name: Upload lanlu-cli artifacts
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/lanlu-cli-skill-*.zip

  pull_request:
    - *build_pipeline
    - *extension_pipeline
    - *client_pipeline
    - *cli_pipeline
